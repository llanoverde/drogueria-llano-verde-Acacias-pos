<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Droguería Llano Verde POS</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#0a7b34;
}

.container{
display:flex;
gap:20px;
}

.productos{
width:60%;
background:white;
padding:20px;
border-radius:10px;
}

.ventas{
width:40%;
background:white;
padding:20px;
border-radius:10px;
}

.producto{
border-bottom:1px solid #eee;
padding:10px;
display:flex;
justify-content:space-between;
}

button{
background:#0a7b34;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#095f29;
}

#buscar{
width:100%;
padding:10px;
margin-bottom:15px;
}

.total{
font-size:22px;
font-weight:bold;
color:#0a7b34;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Droguería Llano Verde POS</h1>

<input type="text" id="buscar" placeholder="Buscar medicamento..." onkeyup="buscar()">

<div class="container">

<div class="productos">

<h2>Medicamentos</h2>

<div id="listaProductos"></div>

</div>

<div class="ventas">

<h2>Venta</h2>

<ul id="listaVenta"></ul>

<div class="total" id="total">Total: $0</div>

</div>

</div>

<script>

let productos = [

{nombre:"Acetaminofén",precio:2000},
{nombre:"Ibuprofeno",precio:3000},
{nombre:"Amoxicilina",precio:6000},
{nombre:"Aspirina",precio:2500},
{nombre:"Diclofenaco",precio:3500},
{nombre:"Loratadina",precio:4000},
{nombre:"Omeprazol",precio:4500},
{nombre:"Buscapina",precio:3800},
{nombre:"Sal de Frutas",precio:2000},
{nombre:"Dolex",precio:4200}

]

let total = 0

function mostrarProductos(lista){

let contenedor = document.getElementById("listaProductos")

contenedor.innerHTML=""

lista.forEach(p=>{

let div=document.createElement("div")
div.className="producto"

div.innerHTML=`
<span>${p.nombre} - $${p.precio}</span>
<button onclick="vender('${p.nombre}',${p.precio})">Agregar</button>
`

contenedor.appendChild(div)

})

}

function vender(nombre,precio){

let lista=document.getElementById("listaVenta")

let item=document.createElement("li")

item.innerText=nombre+" - $"+precio

lista.appendChild(item)

total+=precio

document.getElementById("total").innerText="Total: $"+total

}

function buscar(){

let texto=document.getElementById("buscar").value.toLowerCase()

let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(texto))

mostrarProductos(filtrados)

}

mostrarProductos(productos)

</script>

</body>
</html>
